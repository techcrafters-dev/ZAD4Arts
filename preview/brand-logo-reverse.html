<!-- @dsCard group="Brand" viewport="700x220" name="Reverse logo" subtitle="White on purple / red" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);}
  .card{width:700px;box-sizing:border-box;padding:24px;font-family:var(--sans);display:flex;gap:18px;}
  .field{flex:1;border-radius:var(--r-lg);height:170px;display:flex;align-items:center;justify-content:center;position:relative;}
  .field img{height:88px;}
  .cap{position:absolute;bottom:11px;left:14px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
</style>
</head>
<body>
<div class="card">
  <div class="field" style="background:var(--purple-500)">
    <img src="../assets/zad-logo-white.png" alt="Zad reverse on purple">
    <span class="cap" style="color:rgba(255,255,255,.7)">Reverse · on purple</span>
  </div>
  <div class="field" style="background:var(--red-500)">
    <img src="../assets/zad-logo-white.png" alt="Zad reverse on red">
    <span class="cap" style="color:rgba(255,255,255,.7)">Reverse · on red</span>
  </div>
</div>
</body>
</html>
