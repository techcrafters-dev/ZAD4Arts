<!-- @dsCard group="Type" viewport="700x250" name="Display" subtitle="Cairo — display weight" -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);}
  .card{width:700px;box-sizing:border-box;padding:30px 32px;font-family:var(--sans);direction:rtl;}
  .eye{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--primary);margin-bottom:14px;direction:ltr;text-align:right;}
  .spec{font-family:var(--display);font-weight:800;font-size:62px;line-height:1.15;color:var(--fg1);margin:0;}
  .spec .en{display:block;font-size:52px;line-height:1.0;letter-spacing:-.01em;direction:ltr;text-align:right;margin-top:6px;}
  .spec em{font-style:normal;color:var(--purple-500);}
  .meta{margin-top:16px;font-size:12px;color:var(--fg3);direction:ltr;text-align:right;}
  .meta b{color:var(--fg2);font-weight:600;}
</style>
</head>
<body>
<div class="card">
  <div class="eye">DISPLAY · CAIRO</div>
  <p class="spec">حيث تجد الفنون <em>صوتها</em><span class="en">Where art finds its <em>voice</em></span></p>
  <div class="meta"><b>Cairo</b> · 800 · 62–84px · Arabic + Latin · one family for everything</div>
</div>
</body>
</html>
