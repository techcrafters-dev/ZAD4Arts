<!-- @dsCard group="Type" viewport="700x230" name="Heading scale" subtitle="H1–H4 · all Cairo" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);}
  .card{width:700px;box-sizing:border-box;padding:26px 32px;font-family:var(--sans);}
  .line{display:flex;align-items:baseline;gap:16px;padding:9px 0;border-bottom:1px solid var(--line);}
  .line:last-child{border-bottom:0;}
  .tag{flex:0 0 110px;font-size:10.5px;color:var(--fg3);font-weight:600;letter-spacing:.03em;}
  .samp{color:var(--fg1);font-family:var(--sans);}
</style>
</head>
<body>
<div class="card">
  <div class="line"><span class="tag">H1 · 800 · 60</span><span class="samp" style="font-weight:800;font-size:44px;line-height:1;letter-spacing:-.01em">The performing arts</span></div>
  <div class="line"><span class="tag">H2 · 700 · 42</span><span class="samp" style="font-weight:700;font-size:35px;line-height:1;letter-spacing:-.01em">Theater, music & dance</span></div>
  <div class="line"><span class="tag">H3 · 700 · 30</span><span class="samp" style="font-weight:700;font-size:27px;line-height:1;letter-spacing:-.01em">Programs that nourish</span></div>
  <div class="line"><span class="tag">H4 · 600 · 22</span><span class="samp" style="font-weight:600;font-size:22px;line-height:1">Upcoming events</span></div>
</div>
</body>
</html>
