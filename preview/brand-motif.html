<!-- @dsCard group="Brand" viewport="700x180" name="Diamond motif" subtitle="Signature shape in use" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);}
  .card{width:700px;box-sizing:border-box;padding:28px 32px;font-family:var(--sans);}
  .t{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--fg3);margin-bottom:16px;}
  .scene{display:flex;align-items:center;gap:14px;}
  .ds{transform:rotate(45deg);flex:0 0 auto;}
  .copy{font-family:var(--display);font-weight:700;font-size:30px;color:var(--fg1);line-height:1;}
  .row2{display:flex;gap:14px;margin-top:24px;align-items:center;}
  .use{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--fg2);}
  .use.oncolor{background:var(--purple-700);color:#fff;padding:9px 14px;border-radius:999px;}
  .mini{width:8px;height:8px;transform:rotate(45deg);}
</style>
</head>
<body>
<div class="card">
  <div class="t">Diamond motif in use</div>
  <div class="scene">
    <span class="ds" style="width:22px;height:22px;background:var(--purple-500)"></span>
    <span class="copy">Theater</span>
    <span class="ds" style="width:14px;height:14px;background:var(--red-500)"></span>
    <span class="copy">Music</span>
    <span class="ds" style="width:14px;height:14px;background:var(--teal)"></span>
    <span class="copy">Dance</span>
  </div>
  <div class="row2">
    <span class="use oncolor"><span class="mini" style="background:var(--cream)"></span>bullet / list marker · cream</span>
    <span class="use"><span class="mini" style="background:var(--red-500)"></span>section divider</span>
    <span class="use"><span class="mini" style="border:1.5px solid var(--purple-400)"></span>outline accent</span>
  </div>
</div>
</body>
</html>
