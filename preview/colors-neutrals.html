<!-- @dsCard group="Colors" viewport="700x170" name="Neutrals" subtitle="Warm-tinted greys, fg & lines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);}
  .card{width:700px;box-sizing:border-box;padding:26px 30px;font-family:var(--sans);}
  .scale{display:flex;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--line);}
  .step{flex:1;height:70px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:7px;}
  .n{font-size:10px;font-weight:700;}
  .labels{display:flex;margin-top:8px;}
  .labels span{flex:1;text-align:center;font-size:10px;color:var(--fg3);line-height:1.3;}
</style>
</head>
<body>
<div class="card">
  <div class="scale">
    <div class="step" style="background:var(--ink)"><span class="n" style="color:#fff">ink</span></div>
    <div class="step" style="background:var(--ink-2)"><span class="n" style="color:#fff">ink-2</span></div>
    <div class="step" style="background:var(--ink-3)"><span class="n" style="color:#fff">ink-3</span></div>
    <div class="step" style="background:var(--line-strong)"><span class="n" style="color:#4A4453">line+</span></div>
    <div class="step" style="background:var(--line)"><span class="n" style="color:#837D8C">line</span></div>
    <div class="step" style="background:var(--field)"><span class="n" style="color:#837D8C">field</span></div>
  </div>
  <div class="labels">
    <span>#111111<br>fg1</span><span>#4A4453<br>fg2</span><span>#837D8C<br>fg3</span><span>#CFC8D6<br>divider</span><span>#E7E3EC<br>hairline</span><span>#F7F5F9<br>surface</span>
  </div>
</div>
</body>
</html>
