<!-- @dsCard group="Type" viewport="700x230" name="Arabic type" subtitle="Cairo, RTL" -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);}
  .card{width:700px;box-sizing:border-box;padding:26px 32px;font-family:var(--sans);direction:rtl;}
  .eye{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--primary);margin-bottom:10px;direction:ltr;text-align:right;}
  .disp{font-family:var(--display);font-weight:800;font-size:54px;line-height:1.3;color:var(--fg1);margin:0;}
  .disp em{color:var(--purple-500);font-style:normal;}
  .body{font-family:var(--sans-arabic);font-size:18px;line-height:1.9;color:var(--fg2);margin:14px 0 0;}
  .meta{margin-top:16px;font-size:11.5px;color:var(--fg3);direction:ltr;text-align:right;}
</style>
</head>
<body>
<div class="card">
  <div class="eye">ARABIC · RTL</div>
  <p class="disp">زاد <em>الفنون</em></p>
  <p class="body">منظمة غير ربحية تدعم الفنون الأدائية في الأردن — المسرح والموسيقى والرقص.</p>
  <div class="meta"><b>Cairo</b> · 800 display / 400 body · line-height 1.3 / 1.9 · one family, Arabic + Latin</div>
</div>
</body>
</html>
