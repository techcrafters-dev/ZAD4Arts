<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="xs → pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);}
  .card{width:700px;box-sizing:border-box;padding:26px 30px;font-family:var(--sans);display:flex;gap:16px;}
  .r{flex:1;display:flex;flex-direction:column;align-items:center;gap:9px;}
  .box{width:100%;height:64px;background:var(--purple-100);border:1.5px solid var(--purple-300);}
  .nm{font-size:11px;color:var(--fg2);font-weight:600;}
  .vl{font-size:10px;color:var(--fg3);}
</style>
</head>
<body>
<div class="card">
  <div class="r"><div class="box" style="border-radius:var(--r-xs)"></div><span class="nm">xs</span><span class="vl">4px</span></div>
  <div class="r"><div class="box" style="border-radius:var(--r-sm)"></div><span class="nm">sm</span><span class="vl">8px</span></div>
  <div class="r"><div class="box" style="border-radius:var(--r-md)"></div><span class="nm">md</span><span class="vl">12px</span></div>
  <div class="r"><div class="box" style="border-radius:var(--r-lg)"></div><span class="nm">lg</span><span class="vl">18px</span></div>
  <div class="r"><div class="box" style="border-radius:var(--r-xl)"></div><span class="nm">xl</span><span class="vl">28px</span></div>
  <div class="r"><div class="box" style="border-radius:var(--r-pill)"></div><span class="nm">pill</span><span class="vl">999px</span></div>
</div>
</body>
</html>
