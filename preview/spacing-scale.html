<!-- @dsCard group="Spacing" viewport="700x330" name="Spacing scale" subtitle="8-pt steps s-1…s-10" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);}
  .card{width:700px;box-sizing:border-box;padding:24px 32px;font-family:var(--sans);}
  .row{display:flex;align-items:center;gap:14px;padding:5px 0;}
  .name{flex:0 0 64px;font-size:11px;color:var(--fg3);font-weight:600;font-variant-numeric:tabular-nums;}
  .bar{height:14px;background:var(--purple-200);border-radius:3px;}
  .px{font-size:11px;color:var(--fg3);font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="name">s-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
  <div class="row"><span class="name">s-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
  <div class="row"><span class="name">s-3</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
  <div class="row"><span class="name">s-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
  <div class="row"><span class="name">s-5</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
  <div class="row"><span class="name">s-6</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
  <div class="row"><span class="name">s-7</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
  <div class="row"><span class="name">s-8</span><div class="bar" style="width:64px;background:var(--purple-400)"></div><span class="px">64</span></div>
  <div class="row"><span class="name">s-9</span><div class="bar" style="width:96px;background:var(--purple-400)"></div><span class="px">96</span></div>
  <div class="row"><span class="name">s-10</span><div class="bar" style="width:128px;background:var(--purple-500)"></div><span class="px">128</span></div>
</div>
</body>
</html>
