<!-- @dsCard group="Brand" viewport="700x200" name="Primary logo" subtitle="Black on white lockup" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);}
  .card{width:700px;box-sizing:border-box;padding:30px 34px;font-family:var(--sans);display:flex;align-items:center;gap:36px;}
  .logo{height:120px;}
  .meta .t{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--fg3);margin-bottom:8px;}
  .meta p{font-size:13px;color:var(--fg2);line-height:1.6;margin:0;max-width:300px;}
  .meta b{color:var(--fg1);}
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="../assets/zad-logo-black.png" alt="Zad for Arts logo">
  <div class="meta">
    <div class="t">Primary logo</div>
    <p><b>Black on white</b> — the default lockup. Arabic زاد الفنون with ZAD FOR ARTS. Keep clear space ≥ the height of the "Z". Never recolor or distort.</p>
  </div>
</div>
</body>
</html>
