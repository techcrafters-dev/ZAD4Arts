<!-- @dsCard group="Components" viewport="700x100" name="Header nav" subtitle="Red active underline + hover lift" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);}
  .card{width:700px;box-sizing:border-box;padding:0;font-family:var(--sans);}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:18px 30px;border-bottom:1px solid var(--line);}
  .logo{height:34px;}
  .links{display:flex;align-items:center;gap:26px;}
  .links a{position:relative;font-size:14px;font-weight:600;color:var(--fg2);text-decoration:none;padding:6px 2px;transition:color var(--ease-out) .3s,transform var(--ease-out) .3s;}
  .links a::after{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:-4px;height:2.5px;width:0;border-radius:2px;background:var(--red);transition:width var(--ease-out) .35s;}
  .links a:hover{color:var(--purple-600);transform:translateY(-2px);}
  .links a:hover::after{width:100%;}
  .links a.active{color:var(--purple-700);}
  .links a.active::after{width:100%;}
  .right{display:flex;align-items:center;gap:16px;}
  .lang{font-size:13px;font-weight:700;color:var(--fg3);letter-spacing:.04em;}
  .cta{background:var(--purple-500);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:var(--r-sm);}
</style>
</head>
<body>
<div class="card">
  <div class="nav">
    <img class="logo" src="../assets/zad-logo-black.png" alt="Zad for Arts">
    <div class="links">
      <a class="active">Home</a>
      <a class="demo-hover">Who We Are</a>
      <a>Programs</a>
      <a>Events</a>
    </div>
    <div class="right">
      <span class="lang">ع / EN</span>
      <span class="cta">Become a friend</span>
    </div>
  </div>
</div>
<style>.demo-hover::after{width:100%;background:var(--red);opacity:.4;}</style>
</body>
</html>
