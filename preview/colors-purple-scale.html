<!-- @dsCard group="Colors" viewport="700x150" name="Purple scale" subtitle="Primary brand ramp 50–900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);}
  .card{width:700px;box-sizing:border-box;padding:26px 30px;font-family:var(--sans);}
  .scale{display:flex;border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .step{flex:1;height:78px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;}
  .n{font-size:10px;font-weight:700;letter-spacing:.04em;}
  .hexrow{display:flex;margin-top:7px;}
  .hexrow span{flex:1;text-align:center;font-size:9.5px;color:var(--fg3);font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="card">
  <div class="scale">
    <div class="step" style="background:var(--purple-50)"><span class="n" style="color:#6E008C">50</span></div>
    <div class="step" style="background:var(--purple-100)"><span class="n" style="color:#6E008C">100</span></div>
    <div class="step" style="background:var(--purple-200)"><span class="n" style="color:#3F0050">200</span></div>
    <div class="step" style="background:var(--purple-300)"><span class="n" style="color:#fff">300</span></div>
    <div class="step" style="background:var(--purple-400)"><span class="n" style="color:#fff">400</span></div>
    <div class="step" style="background:var(--purple-500)"><span class="n" style="color:#fff">500</span></div>
    <div class="step" style="background:var(--purple-600)"><span class="n" style="color:#fff">600</span></div>
    <div class="step" style="background:var(--purple-700)"><span class="n" style="color:#fff">700</span></div>
    <div class="step" style="background:var(--purple-800)"><span class="n" style="color:#fff">800</span></div>
    <div class="step" style="background:var(--purple-900)"><span class="n" style="color:#fff">900</span></div>
  </div>
  <div class="hexrow">
    <span>F8ECFB</span><span>EFD3F6</span><span>DDA6EC</span><span>C672DF</span><span>A634C6</span><span>8400A9</span><span>6E008C</span><span>57006E</span><span>3F0050</span><span>2A0035</span>
  </div>
</div>
</body>
</html>
